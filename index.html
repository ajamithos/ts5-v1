<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toy Story 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
  }

  #video-player {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* ---- TAP TO PLAY — red/yellow shimmer ---- */
  #begin-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 20;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 52px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #begin-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    background: linear-gradient(
      105deg,
      #ffffff 0%, #ffffff 30%,
      #FFD700 42%, #FF4500 50%,
      #FFD700 58%, #ffffff 70%, #ffffff 100%
    );
    background-size: 300% 100%;
    background-position: 200% 0;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer-slide 2.8s ease-in-out infinite, breathe 2.8s ease-in-out infinite;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.9));
  }
  @keyframes shimmer-slide {
    0%   { background-position: 200% 0; }
    60%  { background-position: -100% 0; }
    100% { background-position: -100% 0; }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.65; }
    50%       { opacity: 1; }
  }

  /* Loading indicator — shown while video buffering after tap */
  #loading-indicator {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 25;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #loading-indicator.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,215,0,0.2);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: -apple-system, sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(255,215,0,0.7);
  }

  /* ---- SENSOR GLOW ---- */
  #sensor-glow {
    position: fixed;
    left: 50%;
    top: 72%;
    transform: translate(-50%, -50%);
    width: 140px; height: 140px;
    z-index: 5;
    display: none;
    pointer-events: none;
  }
  #sensor-glow.active { display: block; }

  .glow-core {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,220,60,0.7) 0%,
      rgba(255,140,0,0.3) 55%,
      transparent 100%
    );
    animation: core-pulse 1.6s ease-in-out infinite;
  }
  @keyframes core-pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.75; }
    50%       { transform: translate(-50%,-50%) scale(1.35); opacity: 1; }
  }

  .glow-ring {
    position: absolute; top: 50%; left: 50%;
    border-radius: 50%;
    border: 2px solid rgba(255,210,40,0.9);
    opacity: 0;
    animation: ring-expand 2s ease-out infinite;
  }
  .r1 { width:  52px; height:  52px; animation-delay: 0s; }
  .r2 { width:  90px; height:  90px; animation-delay: 0.65s; }
  .r3 { width: 140px; height: 140px; animation-delay: 1.3s; }
  @keyframes ring-expand {
    0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.95; }
    100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
  }

  /* ---- TOUCH LAYER during playback ---- */
  #touch-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- muted is REQUIRED for autoplay to work on GitHub Pages / HTTPS -->
<video id="video-player" playsinline webkit-playsinline muted preload="metadata"></video>

<div id="sensor-glow">
  <div class="glow-core"></div>
  <div class="glow-ring r1"></div>
  <div class="glow-ring r2"></div>
  <div class="glow-ring r3"></div>
</div>

<div id="loading-indicator">
  <div class="spinner"></div>
  <div class="loading-text">Loading...</div>
</div>

<div id="begin-overlay" onclick="beginExperience()">
  <div id="begin-label">Tap to Play</div>
</div>

<div id="touch-layer" onclick="onTap()"></div>

<script>
var CONFIG = {
  videoSrc: "rex_web.mp4",
  touchPoints: [
    { start: 3.517, end: 4.438 },
    { start: 7.595, end: 8.903 }
  ],
  frameBuffer: 0.05
};

var tpIndex       = 0;
var waitingForTap = false;
var playing       = false;

var video          = document.getElementById('video-player');
var beginOverlay   = document.getElementById('begin-overlay');
var touchLayer     = document.getElementById('touch-layer');
var sensorGlow     = document.getElementById('sensor-glow');
var loadingIndicator = document.getElementById('loading-indicator');

// Set src — preload="metadata" just loads enough to get duration
// without stalling on slow connections
video.src = CONFIG.videoSrc;

// ── BEGIN — called on Tap to Play click ──
function beginExperience() {
  beginOverlay.style.display = 'none';
  loadingIndicator.classList.add('show');

  // Reset state
  tpIndex       = 0;
  waitingForTap = false;
  playing       = false;
  sensorGlow.classList.remove('active');

  // Seek to start, then play
  // Use canplay event to ensure enough data before play()
  video.currentTime = 0;

  function tryPlay() {
    var playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.then(function() {
        // Play started successfully
        loadingIndicator.classList.remove('show');
        touchLayer.style.display = 'block';
        playing = true;
      }).catch(function(err) {
        // Play failed — most likely still buffering
        // Wait for canplay then retry
        loadingIndicator.classList.remove('show');
        beginOverlay.style.display = 'flex'; // show tap again
        console.warn('Play failed:', err.message);
      });
    } else {
      // Old browser — no promise, just assume it worked
      loadingIndicator.classList.remove('show');
      touchLayer.style.display = 'block';
      playing = true;
    }
  }

  // If video has enough data, play immediately
  // Otherwise wait for canplay
  if (video.readyState >= 3) { // HAVE_FUTURE_DATA
    tryPlay();
  } else {
    video.addEventListener('canplay', function handler() {
      video.removeEventListener('canplay', handler);
      tryPlay();
    });
  }
}

// ── TIMEUPDATE — watch for touch points ──
video.addEventListener('timeupdate', function() {
  if (!playing || waitingForTap) return;
  if (tpIndex >= CONFIG.touchPoints.length) return;
  var tp = CONFIG.touchPoints[tpIndex];
  if (video.currentTime >= tp.end - CONFIG.frameBuffer) {
    video.pause();
    waitingForTap = true;
    sensorGlow.classList.add('active');
  }
});

// ── ON TAP during playback ──
function onTap() {
  if (!waitingForTap) return;
  waitingForTap = false;
  sensorGlow.classList.remove('active');
  tpIndex++;
  video.play().catch(function() {});
}

// ── VIDEO ENDED — show Tap to Play again ──
video.addEventListener('ended', function() {
  playing = false;
  sensorGlow.classList.remove('active');
  touchLayer.style.display   = 'none';
  beginOverlay.style.display = 'flex';
});

// ── STALL RECOVERY — if video stalls mid-play ──
video.addEventListener('stalled', function() {
  if (!playing) return;
  // Brief pause then retry
  setTimeout(function() {
    if (!video.paused && !waitingForTap) {
      video.play().catch(function() {});
    }
  }, 1000);
});

// Prevent zoom
document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
var lastTap = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
